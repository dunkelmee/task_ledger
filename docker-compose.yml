version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: freelance
      POSTGRES_PASSWORD: freelance_pass
      POSTGRES_DB: freelance_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freelance -d freelance_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  frankfurter:
    image: lineofflight/frankfurter
    restart: unless-stopped
    # Internal port 8080; reachable as http://frankfurter:8080 from backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/latest || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://freelance:freelance_pass@db:5432/freelance_db
      UPLOAD_DIR: /app/uploads
      FRANKFURTER_URL: http://frankfurter:8080
      ADMIN_USERNAME: tlorch
      ADMIN_PASSWORD: Pass1506!
    depends_on:
      db:
        condition: service_healthy
      frankfurter:
        condition: service_started
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads:
